<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polytope Gallery - Pardesco 4D</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <div class="min-h-screen bg-dark p-6">
    <div class="max-w-7xl mx-auto">
      <h1 class="text-4xl font-display font-bold mb-2">
        <span class="text-gradient">Polytope Gallery</span>
      </h1>
      <p class="text-gray-400 mb-8">Coming soon - Browse all 2,816 uniform polytopes</p>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Placeholder cards -->
        <div class="glass-morphism p-6 rounded-xl">
          <h3 class="text-xl font-bold mb-2">Category 1</h3>
          <p class="text-gray-400 text-sm">Regular polytopes</p>
        </div>
        <div class="glass-morphism p-6 rounded-xl">
          <h3 class="text-xl font-bold mb-2">Category 2</h3>
          <p class="text-gray-400 text-sm">Semi-regular polytopes</p>
        </div>
        <div class="glass-morphism p-6 rounded-xl">
          <h3 class="text-xl font-bold mb-2">Category 3</h3>
          <p class="text-gray-400 text-sm">Complex polytopes</p>
        </div>
      </div>

      <div class="mt-8">
        <a href="/" class="btn-secondary inline-block px-6 py-3">← Back to Home</a>
      </div>
    </div>
  </div>

</html>
