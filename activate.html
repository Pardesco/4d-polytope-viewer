<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate Your License - 4D Polytope Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .message.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        .help-text {
            margin-top: 20px;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }

        .help-text a {
            color: #667eea;
            text-decoration: none;
        }

        .help-text a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Activate Your License</h1>
        <p class="subtitle">Enter your license key to unlock Creator features</p>

        <div id="message" class="message"></div>

        <form id="activation-form">
            <div class="form-group">
                <label for="license-key">License Key</label>
                <input
                    type="text"
                    id="license-key"
                    name="license-key"
                    placeholder="Enter your license key"
                    required
                    autocomplete="off"
                >
            </div>

            <button type="submit" id="submit-btn">
                Activate License
            </button>
        </form>

        <div class="help-text">
            <p>Don't have a license yet?</p>
            <!-- TODO: Replace with your actual LemonSqueezy checkout URL -->
            <a href="https://pardesco.lemonsqueezy.com/checkout/buy/9ad7313d-9bc5-42da-b955-a86fc201518c?logo=0" target="_blank">
                Purchase Creator License
            </a>
        </div>
    </div>

    <script type="module">
        import { LicenseManager } from './src/js/license/LicenseManager.js';

        const licenseManager = new LicenseManager();
        const form = document.getElementById('activation-form');
        const licenseKeyInput = document.getElementById('license-key');
        const submitBtn = document.getElementById('submit-btn');
        const message = document.getElementById('message');

        // Pre-fill from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const keyParam = urlParams.get('key');

        if (keyParam) {
            licenseKeyInput.value = keyParam;
            showMessage('Your license key has been pre-filled. Click "Activate License" to continue.', 'info');
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const licenseKey = licenseKeyInput.value.trim();

            if (!licenseKey) {
                showMessage('Please enter a license key.', 'error');
                return;
            }

            // Disable form
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Activating...';

            try {
                // Validate with LemonSqueezy
                const result = await licenseManager.validate(licenseKey);

                if (result.success) {
                    showMessage(`Success! Your ${result.tier} tier has been activated. Redirecting...`, 'success');

                    // Redirect to viewer after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showMessage(result.error || 'Activation failed. Please check your license key.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Activate License';
                }
            } catch (error) {
                showMessage('An error occurred. Please try again later.', 'error');
                console.error('Activation error:', error);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Activate License';
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
        }
    </script>
</body>
</html>
